name: Build RootX v6.0

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install ESP-IDF v6.0
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git flex bison gperf python3-pip python3-setuptools cmake ninja-build ccache libffi-dev libssl-dev dfu-util
          git clone -b v6.0 --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp-idf
          ~/esp-idf/install.sh

      - name: Patch gdbstub Source
        run: |
          python3 -c "import os,pathlib; p=pathlib.Path(os.path.expanduser('~/esp-idf'))/'components/esp_gdbstub/src/gdbstub.c'; s=p.read_text(encoding='utf-8'); s=s.replace('#if (CONFIG_ESP_SYSTEM_GDBSTUB_RUNTIME || CONFIG_ESP_GDBSTUB_SUPPORT_TASKS)', '#if 1'); p.write_text(s, encoding='utf-8')"

      - name: Build Firmware
        run: |
          # 1. Masuk ke folder hasil clone dan aktifkan
          cd ~/esp-idf
          ./install.sh
          . ./export.sh
          cd $GITHUB_WORKSPACE
          
          # 2. Patching pake path yang PASTI ADA
          # Kita hajar file wifi_init.c di lokasi clone v6.0
          python3 -c "import os; p=os.path.expanduser('~/esp-idf/components/esp_wifi/src/wifi_init.c'); \
          if os.path.exists(p): \
              s=open(p).read().replace('return ESP_ERR_WIFI_IF;', 'return ESP_OK;'); \
              open(p,'w').write(s); \
              print('Patch wifi_init.c Berhasil!')"

          # 3. Build Project
          cp sdkconfig.defaults sdkconfig
          idf.py set-target esp32s3
          idf.py clean
          idf.py build



      - name: Upload Bin
        uses: actions/upload-artifact@v4
        with:
          name: RootX-v6-Firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
            build/flashing_args

