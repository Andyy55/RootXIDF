name: Build RootX v6.0 Fast

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # --- INI KUNCINYA: CACHE IDF ---
      - name: Cache ESP-IDF
        id: cache-idf
        uses: actions/cache@v4
        with:
          path: |
            ~/esp-idf
            ~/.espressif
          key: esp-idf-v6.0-${{ runner.os }}-v1
          restore-keys: |
            esp-idf-v6.0-${{ runner.os }}-

      - name: Install ESP-IDF v6.0 (Hanya Jalan Kalau Cache Gak Ada)
        if: steps.cache-idf.outputs.cache-hit != 'true'
        run: |
          sudo apt-get update
          sudo apt-get install -y wget git flex bison gperf python3-pip python3-setuptools cmake ninja-build ccache libffi-dev libssl-dev dfu-util
          git clone -b v6.0 --depth 1 --recursive https://github.com/espressif/esp-idf.git ~/esp-idf
          ~/esp-idf/install.sh

      - name: Patch gdbstub Source
        run: |
          python3 -c "import os,pathlib; p=pathlib.Path(os.path.expanduser('~/esp-idf'))/'components/esp_gdbstub/src/gdbstub.c'; s=p.read_text(encoding='utf-8'); s=s.replace('#if (CONFIG_ESP_SYSTEM_GDBSTUB_RUNTIME || CONFIG_ESP_GDBSTUB_SUPPORT_TASKS)', '#if 1'); p.write_text(s, encoding='utf-8')"
          
      - name: Build Firmware
        run: |
          . ~/esp-idf/export.sh
          
          # Patching pake cara yang aman buat Python one-liner
          python3 -c "import os; p=os.path.expanduser('~/esp-idf/components/esp_wifi/src/wifi_init.c'); \
          f=open(p,'r').read() if os.path.exists(p) else ''; \
          open(p,'w').write(f.replace('return ESP_ERR_WIFI_IF;', 'return ESP_OK;')) if f else print('File not found')"
          
          echo "Patch Selesai, Lanjut Build..."

          cp sdkconfig.defaults sdkconfig
          idf.py set-target esp32s3
          idf.py build


      - name: Upload Bin
        uses: actions/upload-artifact@v4
        with:
          name: RootX-v6-Firmware
          path: |
            build/bootloader/bootloader.bin
            build/partition_table/partition-table.bin
            build/*.bin
            build/flashing_args



